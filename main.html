<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>359 Golf Club - Responsive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 페이지 전환 애니메이션 */
        .page-content { display: none; }
        .page-active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 네비게이션 활성화 상태 */
        .nav-active { color: #059669 !important; font-weight: 700; }
        
        /* 차트 높이 조절 */
        .chart-container { position: relative; height: 300px; width: 100%; }
        @media (min-width: 1024px) { .chart-container { height: 400px; } }

        /* 커스텀 스크롤바 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 pb-20 pt-16 lg:pb-0 lg:pt-20">

    <!-- [Header] PC/모바일 통합 헤더 -->
    <header class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md z-50 border-b border-slate-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <!-- 로고 -->
            <div class="flex items-center gap-2 cursor-pointer shrink-0" onclick="showPage('my-score')">
                <div class="bg-emerald-600 p-1.5 rounded-lg">
                    <i data-lucide="flag" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-lg font-black tracking-tighter text-emerald-900">359 <span class="font-light">GOLF</span></h1>
            </div>

            <!-- PC 전용 메뉴 -->
            <nav class="hidden lg:flex items-center gap-8">
                <button onclick="showPage('my-score')" class="nav-item-pc text-sm font-medium text-slate-500 hover:text-emerald-600 transition-colors" id="pc-nav-my-score">My Score</button>
                <button onclick="showPage('dashboard')" class="nav-item-pc text-sm font-medium text-slate-500 hover:text-emerald-600 transition-colors" id="pc-nav-dashboard">Dashboard</button>
                <button onclick="showPage('board')" class="nav-item-pc text-sm font-medium text-slate-500 hover:text-emerald-600 transition-colors" id="pc-nav-board">Community</button>
            </nav>

            <!-- 사용자 선택 (모바일/PC 공통 노출) -->
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="text-right">
                    <p class="text-[9px] text-slate-400 font-bold leading-none mb-0.5">PLAYER</p>
                    <select id="userSelector" onchange="switchUser(this.value)" class="text-sm font-bold bg-transparent border-none p-0 focus:ring-0 cursor-pointer text-emerald-700 appearance-none pr-1">
                        <option value="이상전">이상전 님</option>
                        <option value="소회장">소회장 님</option>
                        <option value="김부장">김부장 님</option>
                    </select>
                </div>
                <div class="w-9 h-9 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center text-emerald-600">
                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto">
        <!-- [1] MY SCORE PAGE -->
        <main id="page-my-score" class="page-content page-active px-5 py-6">
            <div class="mb-8 lg:flex lg:items-end lg:justify-between">
                <div>
                    <h2 class="text-2xl lg:text-3xl font-black tracking-tight"><span id="userNameDisplay" class="text-emerald-600">이상전</span> 님,</h2>
                    <p class="text-slate-500 mt-1 italic font-medium text-sm">"골프는 장비빨이 아니라 멘탈빨입니다."</p>
                </div>
                <div class="hidden lg:block text-right">
                    <span id="memberJoinText" class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">2023.02 신규</span>
                </div>
            </div>

            <!-- 요약 카드 -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-emerald-200 transition-all">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-1.5 bg-amber-50 rounded-lg text-amber-500"><i data-lucide="trophy" class="w-4 h-4"></i></div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Best</span>
                    </div>
                    <p class="text-2xl font-black text-slate-800"><span id="bestScoreText">97</span><span class="text-xs font-normal ml-1 text-slate-400">타</span></p>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-emerald-200 transition-all">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-1.5 bg-emerald-50 rounded-lg text-emerald-500"><i data-lucide="target" class="w-4 h-4"></i></div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Avg</span>
                    </div>
                    <p class="text-2xl font-black text-slate-800"><span id="avgScoreText">103.1</span><span class="text-xs font-normal ml-1 text-slate-400">타</span></p>
                </div>
                <div class="col-span-2 bg-emerald-600 rounded-3xl p-5 text-white shadow-lg shadow-emerald-100 flex items-center justify-between relative overflow-hidden">
                    <i data-lucide="medal" class="absolute -right-4 -bottom-4 w-24 h-24 text-white/10 rotate-12"></i>
                    <div class="relative z-10">
                        <h3 class="text-[10px] font-bold opacity-80 mb-1 uppercase tracking-wider">Achievement</h3>
                        <p id="achievementText" class="text-lg lg:text-xl font-black">깨100 달성 (2025.05)</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 차트 영역 -->
                <div class="lg:col-span-2 bg-white p-5 lg:p-8 rounded-3xl shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="activity" class="w-5 h-5 text-emerald-500"></i> 스코어 트렌드
                        </h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="myResponsiveChart"></canvas>
                    </div>
                </div>

                <!-- 히스토리 리스트 -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                    <div class="p-5 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800">라운딩 기록</h3>
                        <i data-lucide="list-ordered" class="w-4 h-4 text-slate-400"></i>
                    </div>
                    <div id="scoreList" class="divide-y divide-slate-50 overflow-y-auto max-h-[300px] lg:max-h-[400px] custom-scroll">
                        <!-- 항목 주입 -->
                    </div>
                </div>
            </div>
        </main>

        <!-- [2] DASHBOARD PAGE -->
        <main id="page-dashboard" class="page-content px-5 py-6">
            <h2 class="text-2xl font-black mb-8 flex items-center gap-3">
                <i data-lucide="bar-chart-2" class="text-emerald-600"></i> 멤버 통합 리포트
            </h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest">정기모임 스코어 추이</h3>
                    <div class="chart-container">
                        <canvas id="groupChart"></canvas>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="p-6 bg-slate-900 rounded-3xl text-white">
                        <p class="text-[10px] font-bold text-slate-500 mb-4 uppercase">멤버별 최근 랭킹</p>
                        <div id="rankingList" class="space-y-5">
                            <!-- 랭킹 데이터 -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- [3] COMMUNITY PAGE -->
        <main id="page-board" class="page-content px-5 py-6">
            <div class="lg:flex lg:gap-10">
                <div class="flex-1 mb-8">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="message-square" class="text-emerald-500"></i> 게시판</h3>
                        <button class="text-[11px] font-bold bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-full">글쓰기</button>
                    </div>
                    <div id="freeBoardList" class="space-y-3"></div>
                </div>
                <div class="flex-1">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="shopping-bag" class="text-amber-500"></i> 중고장터</h3>
                    </div>
                    <div id="marketBoardList" class="grid grid-cols-2 gap-4"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- [Navigation] 모바일 하단 탭 바 -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 py-3 flex justify-between items-center z-50">
        <button onclick="showPage('my-score')" id="btn-my-score" class="nav-item-mobile active flex flex-col items-center gap-1">
            <i data-lucide="user" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold">My Score</span>
        </button>
        <button onclick="showPage('dashboard')" id="btn-dashboard" class="nav-item-mobile flex flex-col items-center gap-1 text-slate-300">
            <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold">Stats</span>
        </button>
        <button onclick="showPage('board')" id="btn-board" class="nav-item-mobile flex flex-col items-center gap-1 text-slate-300">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold">Board</span>
        </button>
        <button class="nav-item-mobile flex flex-col items-center gap-1 text-slate-300">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold">More</span>
        </button>
    </nav>

    <script>
        lucide.createIcons();

        const memberData = {
            "이상전": {
                best: 97, avg: 103.1, info: "2023.2월 신규", achievement: "깨100 달성 (2025.05)",
                labels: ['23.03', '23.05', '24.03', '24.05', '24.09', '25.05', '25.09', '26.03'],
                scores: [114, 108, 103, 101, 107, 97, 97, 108],
                color: '#f59e0b'
            },
            "소회장": {
                best: 87, avg: 93.4, info: "창립 멤버", achievement: "깨80 달성 (2019.03)",
                labels: ['20.03', '20.05', '21.05', '22.03', '22.05', '22.09', '23.03', '23.05', '24.03', '24.05', '24.09', '25.05', '25.09'],
                scores: [97, 91, 91, 96, 87, 100, 103, 97, 89, 93, 91, 89, 97],
                color: '#10b981'
            },
            "김부장": {
                best: 96, avg: 104.5, info: "2016.9 신규", achievement: "깨100 달성 (2020.03)",
                labels: ['20.03', '20.05', '21.05', '22.03', '22.05', '22.09', '23.03', '23.09', '24.03', '24.05', '24.09', '25.05', '25.09', '26.03'],
                scores: [96, 103, 105, 105, 121, 106, 103, 97, 103, 103, 107, 102, 108, 96],
                color: '#3b82f6'
            }
        };

        const boardData = {
            free: [
                { title: "이번 주 라운딩 조편성입니다", author: "소회장", date: "1시간 전" },
                { title: "드라이버 샤프트 강도 질문", author: "이상전", date: "5시간 전" }
            ],
            market: [
                { title: "스텔스2 드라이버", price: "35만", img: "https://images.unsplash.com/photo-1535131749006-b7f58c99034b?w=300&h=300&fit=crop" },
                { title: "보이스캐디 T9", price: "18만", img: "https://images.unsplash.com/photo-1592656670411-b91130bcbe3e?w=300&h=300&fit=crop" }
            ]
        };

        let myChartInstance = null;

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            
            document.querySelectorAll('.nav-item-mobile').forEach(b => {
                b.classList.remove('text-emerald-600');
                b.classList.add('text-slate-300');
            });
            const activeMobileBtn = document.getElementById('btn-' + pageId);
            if(activeMobileBtn) activeMobileBtn.classList.add('text-emerald-600');

            document.querySelectorAll('.nav-item-pc').forEach(b => b.classList.remove('nav-active'));
            const activePcBtn = document.getElementById('pc-nav-' + pageId);
            if(activePcBtn) activePcBtn.classList.add('nav-active');

            window.scrollTo(0,0);
        }

        function switchUser(userName) {
            const data = memberData[userName];
            if(!data) return;

            document.getElementById('userNameDisplay').innerText = userName;
            document.getElementById('bestScoreText').innerText = data.best;
            document.getElementById('avgScoreText').innerText = data.avg;
            document.getElementById('memberJoinText').innerText = data.info;
            document.getElementById('achievementText').innerText = data.achievement;

            const list = document.getElementById('scoreList');
            list.innerHTML = '';
            for(let i = data.labels.length - 1; i >= 0; i--) {
                const isUnder100 = data.scores[i] < 100;
                list.innerHTML += `
                    <div class="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                        <div>
                            <p class="text-sm font-bold text-slate-800">${data.labels[i]} 라운딩</p>
                        </div>
                        <p class="text-base font-black ${isUnder100 ? 'text-emerald-600' : 'text-slate-400'}">${data.scores[i]}타</p>
                    </div>
                `;
            }
            initMyChart(data.labels, data.scores, userName, data.color);
        }

        function initMyChart(labels, scores, name, color) {
            const ctx = document.getElementById('myResponsiveChart').getContext('2d');
            if(myChartInstance) myChartInstance.destroy();
            
            myChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: scores,
                        borderColor: color,
                        backgroundColor: color + '15',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { reverse: true, min: 80, max: 130, grid: { borderDash: [5, 5] } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function initGlobalData() {
            const rankList = document.getElementById('rankingList');
            const rankData = [
                { name: '김부장', score: 96, color: 'blue' },
                { name: '소회장', score: 97, color: 'emerald' },
                { name: '이상전', score: 108, color: 'amber' }
            ];
            rankList.innerHTML = rankData.map((r, i) => `
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold text-slate-600 w-3">${i+1}</span>
                        <span class="text-sm font-medium text-slate-300">${r.name}</span>
                    </div>
                    <span class="text-sm font-black text-${r.color}-500">${r.score}타</span>
                </div>
            `).join('');

            document.getElementById('freeBoardList').innerHTML = boardData.free.map(p => `
                <div class="p-3 bg-white rounded-xl border border-slate-100 shadow-sm">
                    <h4 class="text-xs font-bold text-slate-800 mb-1">${p.title}</h4>
                    <p class="text-[9px] text-slate-400">${p.author} | ${p.date}</p>
                </div>
            `).join('');

            document.getElementById('marketBoardList').innerHTML = boardData.market.map(p => `
                <div class="bg-white rounded-xl overflow-hidden border border-slate-100 shadow-sm">
                    <img src="${p.img}" class="w-full aspect-square object-cover">
                    <div class="p-2">
                        <p class="text-[10px] font-bold text-slate-800 truncate">${p.title}</p>
                        <p class="text-xs font-black text-emerald-600">${p.price}원</p>
                    </div>
                </div>
            `).join('');

            const gCtx = document.getElementById('groupChart').getContext('2d');
            new Chart(gCtx, {
                type: 'line',
                data: {
                    labels: ['25.05', '25.09', '26.03'],
                    datasets: [
                        { label: '소회장', data: [89, 97, 95], borderColor: '#10b981', tension: 0.4 },
                        { label: '김부장', data: [102, 108, 96], borderColor: '#3b82f6', tension: 0.4 },
                        { label: '이상전', data: [97, 97, 108], borderColor: '#f59e0b', tension: 0.4 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { y: { reverse: true, min: 80, max: 120 } },
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: { size: 9 } } } }
                }
            });
        }

        window.onload = () => {
            initGlobalData();
            switchUser("이상전");
            showPage('my-score');
        };
    </script>
</body>
</html>
